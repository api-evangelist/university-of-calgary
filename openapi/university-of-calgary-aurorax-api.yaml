          type: integer
          format: int32
        result_file_deleted_timestamp:
          type: string
          format: date-time
        file_size:
          type: integer
          format: int64
        completed_timestamp:
          type: string
          format: date-time
        query_duration:
          type: integer
          format: int64
        error_condition:
          type: boolean
      description: Search result
    ConjunctionEvent:
      type: object
      properties:
        conjunction_type:
          type: string
          description: 'The conjunction type: north, south, or radial'
          enum:
          - nbtrace
          - sbtrace
          - geographic
        e1_source:
          $ref: '#/components/schemas/Data Source'
        e2_source:
          $ref: '#/components/schemas/Data Source'
        start:
          type: string
          description: When the conjunction started
          format: date-time
        end:
          type: string
          description: When the conjunction ended
          format: date-time
        min_distance:
          type: number
          description: The closest distance between the e1 source and e2 source in the time period
        max_distance:
          type: number
          description: The farthest distance between the e1 source and e2 source in the time period
        generated_e1_ephemeris_query:
          $ref: '#/components/schemas/EphemerisQuery'
        generated_e2_ephemeris_query:
          $ref: '#/components/schemas/EphemerisQuery'
      description: Conjunction events occur between data sources e1 and e2. The labels e1 and e2 simply
        define the program, platform, and instrument_type.  This document contains the sources involved
        along with the start and end time frame as well as the minimum and maximum distance  between e1
        and e2 during the conjunction.
    DataSourceCriteriaForEphemeris:
      type: object
      properties:
        programs:
          type: array
          description: The list of programs in e1 or e2. Programs group platforms. Programs are like 'themis',
            'swarm', 'themis-asi', 'TRex'
          items:
            type: string
            description: The list of programs in e1 or e2. Programs group platforms. Programs are like
              'themis', 'swarm', 'themis-asi', 'TRex'
        platforms:
          type: array
          description: The list of platforms in e1 or e2. Platforms are like 'themis-asi gill' or 'swarma'.
            Use this to narrow the set of sources within the programs listed.
          items:
            type: string
            description: The list of platforms in e1 or e2. Platforms are like 'themis-asi gill' or 'swarma'.
              Use this to narrow the set of sources within the programs listed.
        instrument_types:
          type: array
          description: The list of instrument-types in e1 or e2. Instrument types are like 'panchromatic-asi'.
            A platform may have zero or more instrument types.
          items:
            type: string
            description: The list of instrument-types in e1 or e2. Instrument types are like 'panchromatic-asi'.
              A platform may have zero or more instrument types.
        ephemeris_metadata_filters:
          $ref: '#/components/schemas/MetadataExpressionGroup'
      description: Find Ephemeris data for these Data Sources. This could be a single platform (e.g.,
        gillam;  or swarma), or an entire program containing a group of platforms (e.g., all locations
        in the themis-asi program;  or all satellites in the themis program).
    EphemerisQuery:
      required:
      - data_sources
      type: object
      properties:
        request_id:
          type: string
          description: An optional request_id to be used for this query. Ommit to have the API generate
            one for you. If you are using websockets, this id can be used establish a websocket before
            sending the search request to avoid a race condition of the query finishing before websocket
            is established. This technique is used by the AuroraX website
        data_sources:
          $ref: '#/components/schemas/DataSourceCriteriaForEphemeris'
        start:
          type: string
          description: Return ephemeris data that occured after this timestamp.  Optional. Large time
            windows may take a long time for results to return.
          format: date-time
        end:
          type: string
          description: Return ephemeris data that occured before this timestamp.  Optional. Large time
            windows may take a long time for results to return.
          format: date-time
    MetadataExpression:
      type: object
      properties:
        key:
          type: string
          description: The metadata key found as described in the data_source metadata schema record
        operator:
          type: string
          description: The filter expression operator
          enum:
          - '='
          - <
          - <=
          - '>'
          - '>='
          - '!='
          - in
          - not in
          - between
        values:
          type: array
          description: The value(s) to test for. Note that 'in' and 'not-in' accept a list of values;
            'between' accepts two values; all others accept just one value
          items:
            type: string
            description: The value(s) to test for. Note that 'in' and 'not-in' accept a list of values;
              'between' accepts two values; all others accept just one value
      description: An expression like a where clause in SQL
    MetadataExpressionGroup:
      type: object
      properties:
        logical_operator:
          type: string
          description: Specifies if these filters should be OR'd or AND'd. If omitted, the default is
            to AND the expressions together
          enum:
          - AND
          - OR
        expressions:
          type: array
          description: The list of filter expressions
          items:
            $ref: '#/components/schemas/MetadataExpression'
      description: An expression group to allow for OR'd or AND'd expression filters
    ConjunctionEventFormat:
      type: object
      properties:
        conjunction_type:
          type: boolean
        e1_source:
          $ref: '#/components/schemas/DataSourceFormat'
        e2_source:
          $ref: '#/components/schemas/DataSourceFormat'
        start:
          type: boolean
        end:
          type: boolean
        min_distance:
          type: boolean
        max_distance:
          type: boolean
        generated_e1_ephemeris_query:
          $ref: '#/components/schemas/EphemerisQueryFormat'
        generated_e2_ephemeris_query:
          $ref: '#/components/schemas/EphemerisQueryFormat'
    DataSourceCriteriaForEphemerisFormat:
      type: object
      properties:
        programs:
          type: boolean
        platforms:
          type: boolean
        instrument_types:
          type: boolean
        ephemeris_metadata_filters:
          $ref: '#/components/schemas/MetadataExpressionGroupFormat'
    DataSourceFormat:
      type: object
      properties:
        identifier:
          type: boolean
        program:
          type: boolean
        platform:
          type: boolean
        instrument_type:
          type: boolean
        source_type:
          type: boolean
        display_name:
          type: boolean
        ephemeris_metadata_schema:
          $ref: '#/components/schemas/MetadataSchemaFormat'
        data_product_metadata_schema:
          $ref: '#/components/schemas/MetadataSchemaFormat'
        owner:
          type: boolean
        maintainers:
          type: boolean
        metadata:
          type: boolean
    EphemerisQueryFormat:
      type: object
      properties:
        request_id:
          type: boolean
        data_sources:
          $ref: '#/components/schemas/DataSourceCriteriaForEphemerisFormat'
        start:
          type: boolean
        end:
          type: boolean
    MetadataExpressionFormat:
      type: object
      properties:
        key:
          type: boolean
        operator:
