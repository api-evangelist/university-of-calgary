          type: string
      responses:
        '200':
          description: Timestamp in UTC
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /api/v1/utils/describe/cartesian_products:
    post:
      tags:
      - Utils
      summary: Returns a count of cartesian products (tuples of data sources) of the given conjunction
        search object. This number is the combinations  simple conjunction tuples between each data source
        found through the criteria block
      operationId: cartesianProduct
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuperConjunctionQuery'
        required: true
      responses:
        '200':
          description: The count of cartesian products found
          content:
            application/json: {}
  /api/v1/utils/admin/search_requests/{request_id}:
    delete:
      tags:
      - Utils
      summary: Delete a search request
      description: "Removes this search request and all associated data. \n\n*Must be authenticated*"
      operationId: deleteSearchRequest
      parameters:
      - name: request_id
        in: path
        description: The search request ID
        required: true
        schema:
          type: string
      responses:
        '200':
          description: The search request was delete
        '400':
          description: Invalid request. Please consult the documentation and retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDocument'
        '401':
          description: 'Not Authorized

            Must be authenticated as an Administrator to remove a search request.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDocument'
        '403':
          description: 'Not Permitted

            Only an Administrator may list active searches.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDocument'
      security:
      - ApiKeyAuth: []
      - AccessToken: []
  /api/v1/utils/admin/search_requests:
    get:
      tags:
      - Utils
      summary: List search summaries
      description: "List searches, optionally filtering by: active, type (ephemeris, data_product, conjunction),\
        \ between start/end, file_size >=, result_count >=, query_duration >=, has error_condition \n\n\
        *Must be authenticated*"
      operationId: findSearchRequests
      parameters:
      - name: active
        in: query
        description: 'Filter by active. True: active only, false: completed only, omit: both'
        schema:
          type: boolean
      - name: search_type
        in: query
        description: 'Filter by Search Type. Omit: all'
        schema:
          type: string
          enum:
          - conjunction
          - ephemeris
          - data_product
      - name: start
        in: query
        description: Filter by start. Later than or equal if provided or omit for all before end
        schema:
          type: string
          format: date-time
      - name: end
        in: query
        description: Filter by end. Earlier than or equal if provided or omit for all before start
        schema:
          type: string
          format: date-time
      - name: file_size
        in: query
        description: Filter by file size. Greater than or equal if provided or omit for all file sizes
          (kilobytes). Overrides active to be false.
        schema:
          type: integer
          format: int64
      - name: result_count
        in: query
        description: Filter by result count. Greater than or equal if provided or omit for all result
          counts. Overrides active to be false.
        schema:
          type: integer
          format: int32
      - name: query_duration
        in: query
        description: Filter by query duration (millis). Greater than or equal if provided or omit for
          any duration
        schema:
          type: integer
          format: int64
      - name: error_condition
        in: query
        description: 'Filter by queries with an error condition. Ignored if filtering for active queries.
          True: must have error, false: must not have error, omit: both'
        schema:
          type: boolean
      responses:
        '200':
          description: List of search summaries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SearchRequestListing'
        '400':
          description: Invalid request. Please consult the documentation and retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDocument'
        '401':
          description: 'Not Authorized

            Must be authenticated as an Administrator to list search requests.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDocument'
        '403':
          description: 'Not Permitted

            Only an Administrator may list search requests.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDocument'
      security:
      - ApiKeyAuth: []
      - AccessToken: []
  /api/v1/utils/timezones:
    get:
      tags:
      - Utils
      summary: List available time zones
      description: List available time zones. These should be standard from the TZ Database. In javascript,
        it is possible to use Intl.supportedValuesOf('timeZone') for valid values.
      operationId: listTimeZones
      responses:
        '200':
          description: List of time zones.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /api/v1/utils/describe/query/conjunction:
    post:
      tags:
      - Utils
      summary: Parses the query into an 'SQL like' query expression
      operationId: parse
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuperConjunctionQuery'
        required: true
      responses:
        '200':
          description: The parsed query
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /api/v1/utils/describe/query/data_products:
    post:
      tags:
      - Utils
      summary: Parses the query into an 'SQL like' query expression
      operationId: parse_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataProductQuery'
        required: true
      responses:
        '200':
          description: The parsed query
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /api/v1/utils/describe/query/ephemeris:
    post:
      tags:
      - Utils
      summary: Parses the query into an 'SQL like' query expression
      operationId: parse_2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EphemerisQuery'
        required: true
      responses:
        '200':
          description: The parsed query
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /api/application.wadl/{path}:
    get:
      operationId: getExternalGrammar
      parameters:
      - name: path
        in: path
        required: true
        schema:
          type: string
      responses:
        default:
          description: default response
          content:
            application/xml: {}
  /api/application.wadl:
    get:
      operationId: getWadl
      responses:
        default:
          description: default response
          content:
            application/vnd.sun.wadl+xml: {}
            application/xml: {}
components:
  schemas:
    UserAccount:
      type: object
      properties:
        account_id:
          type: string
        upload_username:
          type: string
        email_address:
          type: string
        email_confirmed:
          type: string
          format: date-time
        first_name:
          type: string
        last_name:
          type: string
        role:
          type: string
          enum:
          - Administrator
          - Owner
          - Maintainer
          - User
        agree_terms:
          type: string
          format: date-time
        this_login:
          type: string
          format: date-time
        last_login:
          type: string
          format: date-time
        disabled:
          type: boolean
    ErrorDocument:
      type: object
      properties:
        error_message:
          type: string
          description: If an error code exists, this will have contextual information for debugging
        error_code:
          type: string
          description: The error code
          enum:
          - Nil
          - Ok
          - NotPermitted
          - NotAuthorized
          - Duplicate
          - AssertionError
          - NotFound
          - ApplicationError
          - NotImplemented
          - ToManyRequests
          - Other
          - Conflict
          - NotAuthenticated
          - Unavailable
      description: This model provides additional details about error conditions that can be used for
        debugging.
    NewAccountRequest:
      required:
      - agree_terms
      - email_address
      - first_name
      - last_name
      - password
      type: object
      properties:
        email_address:
          type: string
          description: The email address of the user. An email will be sent to this address requesting
            confirmation of ownership.
        first_name:
          type: string
          description: The user's first name
        last_name:
          type: string
          description: The user's last name
        agree_terms:
          type: string
          description: A timestamp of when the user agreed to any terms and conditions for use of this
            account
          format: date-time
        password:
          type: string
          description: The users chosen password required to obtain an access token for use on subsequent
            API requests
      description: Represents the basic information required to create an account on AuroraX. Accounts
        are used to perform secure operations, save queries, and other metadata the user wishes to save
        on AuroraX.
    UpdateAccountRequest:
      required:
      - email_address
      type: object
      properties:
        email_address:
          type: string
          description: The email address of the user. An email will be sent to this address requesting
            confirmation of ownership.
        first_name:
          type: string
          description: The user's first name
        last_name:
          type: string
          description: The user's last name
        role:
          type: string
          description: Administrators can update a user's Role
          enum:
          - Administrator
          - Owner
          - Maintainer
          - User
        upload_username:
          type: string
          description: Set an upload_username to participate in citizen science
      description: Represents the basic information required to create an account on AuroraX. Accounts
        are used to perform secure operations, save queries, and other metadata the user wishes to save
        on AuroraX.
    NewApiKeyResponse:
      type: object
      properties:
        api_key:
          type: string
          description: Your secret API key
      description: Your new private API key. Treat this like a password and keep it safe. We do not store
        this value. If your API key is lost, please request a new one. Requesting a new API will invalidate
        the old one. Your API key is tied to your account, so your user role is applied to requests made
        with your API key.
    PasswordResetRequest:
      required:
      - email_address
      - password
      - reset_token
      type: object
      properties:
        email_address:
          type: string
        reset_token:
          type: string
        password:
          type: string
    Data Source:
      required:
      - display_name
      - instrument_type
      - platform
      - program
      - source_type
      type: object
      properties:
        identifier:
          type: integer
          description: Uniquely identifies this record. Optional when adding a new source record; system
            generated, unless this is a replacement (e.g., delete old, create new with same identifier
            as old).
          format: int32
        program:
          type: string
          description: 'Examples: themis, themis-asi, rbsp'
        platform:
          type: string
          description: 'Examples: themisa, gill, rbspb'
        instrument_type:
          type: string
          description: 'Examples: pancromatic-asi'
        source_type:
          type: string
          description: g = Ground, h = Highly Eliptical Orbit, l = Low Earth Orbit
          enum:
          - ground
          - heo
          - leo
          - lunar
          - event_list
          - not_applicable
        display_name:
          type: string
          description: A friendly display name for web applications
        ephemeris_metadata_schema:
          type: array
          description: The ephemeris metadata schema and descriptions
          items:
            $ref: '#/components/schemas/MetadataSchema'
        data_product_metadata_schema:
          type: array
          description: The data_product metadata schema and descriptions
          items:
            $ref: '#/components/schemas/MetadataSchema'
        owner:
          type: string
          description: The Owner of this Data Source record. Defaults to the currently logged in user.
        maintainers:
          type: array
          description: The list of Maintainers
          items:
            type: string
            description: The list of Maintainers
        stats:
          $ref: '#/components/schemas/DataSourceStats'
        metadata:
          $ref: '#/components/schemas/JsonNode'
      description: Things that produce data, like satellites, ground stations/instruments, platforms
    DataProduct Availability:
      type: object
      properties:
        data_source:
          $ref: '#/components/schemas/Data Source'
        available_data_products:
          type: object
          additionalProperties:
            type: integer
            format: int32
      description: DataProduct data availability by Data Source by Data_Product_Type by day.
    DataSourceStats:
      type: object
      properties:
        data_source:
          $ref: '#/components/schemas/Data Source'
        earliest_ephemeris_loaded:
          type: string
          format: date-time
        latest_ephemeris_loaded:
          type: string
          format: date-time
        ephemeris_count:
          type: integer
          format: int32
        earliest_data_product_loaded:
          type: string
          format: date-time
        latest_data_product_loaded:
          type: string
          format: date-time
        data_product_count:
          type: integer
          format: int32
      description: Some basic stats about this data_source, like number of ephemeris records. Read only.
    JsonNode:
      type: object
    MetadataSchema:
      type: object
      properties:
        field_name:
          type: string
          description: The name of the field found in the ephemeris metadata
        description:
          type: string
          description: A brief description of what the metadata field represents
        data_type:
          type: string
          description: An indicator to let you know what filter operations are available. Strings allow
            for =, !=, and in. Decimals allow for =, !=, <, >, <=, >=, and in.
        allowed_values:
          type: array
          description: An optional list of possible values available in the metadata.
          items:
            type: string
            description: An optional list of possible values available in the metadata.
        additional_description:
          type: string
          description: More details about what this metadata field is about
        searchable:
          type: boolean
          description: Used by UI's to include it in metadata fields exposed as searchable through the
            conjunction interface. The API allows for all fields to be searchable but some applications
            may chose to hide any fields marked searchable=false
      description: Describes the metadata fields found on Ephemeris data.
    Ephemeris Availability:
      type: object
      properties:
        data_source:
          $ref: '#/components/schemas/Data Source'
        available_ephemeris:
          type: object
          additionalProperties:
            type: integer
            format: int32
      description: Ephemeris data availability by Data Source by day.
    File Summary:
      required:
      - metadata
      - size_bytes
      - uuid
      type: object
      properties:
        id:
          type: integer
          description: The internal ID of the image (for sorting)
          format: int32
        uuid:
          type: string
          description: The generated UUID of the image
        sha1:
          type: string
          description: The generated SHA1 hash of the image
        original_filename:
          type: string
          description: The original filename of the image
        thumbnail:
          type: string
          description: Name of the thumbnail image
        thumbnail_size_bytes:
          type: integer
          description: Size of the thumbnail image in bytes
          format: int32
        size_bytes:
          type: integer
          description: The size of the image in bytes
          format: int64
        approved:
          type: boolean
          description: Indicates if this image has been approved by the System Administrator for public
            viewing.
        metadata:
          $ref: '#/components/schemas/Image Metadata'
        thumbnail_base64:
          type: string
          description: A thumbnail of the uplaoded image encoded in Base64
        upload_username:
          type: string
          description: The upload username
        upload_date:
          type: string
          description: The date the file was uploaded
          format: date-time
        approved_date:
          type: string
          description: The date the file was approved
          format: date-time
        file_path_on_disk:
          type: string
    Image Metadata:
      required:
      - file_created_timestamp
      - file_format
      - file_type
      - image_height
      - image_width
      - timezone
      type: object
      properties:
        image_width:
          type: integer
          description: The image width in pixels
          format: int32
        image_height:
          type: integer
          description: The image height in pixels
          format: int32
        file_created_timestamp:
          type: string
          description: The timestamp this image/video was taken at.
          format: date-time
        timezone:
          type: string
          description: The timezone in which the file was taken
        timestamp_utc:
          type: string
          description: The UTC equivelant of fileCreatedTimestamp. Becomes the epoch value in the ephemeris
            record created. Optional. Will be calculated.
          format: date-time
        file_original_filename:
          type: string
          description: The file's original filename.
        video_length_seconds:
          type: integer
          description: The length of the video in seconds. Each minute becomes an ephemeris record. Required
            if this is an video, else not required.
          format: int32
        file_format:
          type: string
          description: The file format (png, jpeg, MP4, MOV)
        mime_type:
          type: string
          description: The file mime type as set by the camera manufacturer
        file_type:
          type: string
          description: 'The file type: image or video'
          enum:
          - image
          - video
        geo_location:
          $ref: '#/components/schemas/Location'
      description: The metdata extracted from the image
    Location:
      type: object
      properties:
        lat:
          maximum: 90
          minimum: -90
