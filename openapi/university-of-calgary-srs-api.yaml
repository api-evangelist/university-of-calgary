  /api/v2/atm/inverse:
    post:
      tags:
      - Auroral Transport Model (ATM)
      summary: Perform inverse ATM calculation
      description: "Perform an inverse calculation using **VERSION 2** of the TREx Auroral Transport Model\
        \ and the supplied \ninput parameters.\n\n**NOTE**: This version of the model no longer provides\
        \ extended outputs which are derived when doing a \nsubsequent forward request after the inversion\
        \ determines the energy flux. Instead, we leave this up\nto the user to perform the forward request\
        \ using the parameters of their choosing. This was done to \nallow further customization of the\
        \ forward requests which use inversion-derived inputs.\n\n**NOTE**: As of API version 1.38.0 (released\
        \ 2025-09-10), the `characteristic_energy` output flag has been\ndeprecated. Please use `mean_energy`\
        \ instead. The characteristic_energy flag will be removed in a later release\nto be determined.\n\
        \nInput notes:\n  - By default requests are cached. Use the 'no_cache' parameter to disable this\
        \ functionality\n  - Timestamp\n    - Timestamp is expected to be in UTC\n    - Only specific\
        \ dates are valid at this time. A 400 error will be returned if an unsupported date is\n     \
        \ requested. If you want to get a date that we have not enabled support for yet, please contact\
        \ us.\n    - the 'Z' character at the end of the timestamp is optional, and will be ignored if\
        \ it is supplied\n  - Latitude and longitude\n    - Expected to be in geodetic coordinates\n \
        \   - latitude is currently limited to >=50.0 and <71.5 degrees\n    - longitude is currently\
        \ limited >=-160 and <-75 and degrees\n  - Units and defaults\n    - intensity_4278: Rayleighs,\
        \ default is 1000.0\n    - intensity_5577: Rayleighs, default is 6000.0\n    - intensity_6300:\
        \ Rayleighs, default is 600.0\n    - intensity_8446: Rayleighs, default is 400.0\n    - precipitation_flux_spectral_type:\
        \ valid values are \"gaussian\" or \"maxwellian\", default is \"gaussian\"\n    - nrlmsis_model_version:\
        \ valid values are \"00\" and \"2.0\", default is \"2.0\"\n  - Special logic keyword\n    - If\
        \ you would like special logic to be used, the special_logic_keyword parameter can be set with\
        \ \n      a unique keyword provided by UCalgary staff. This is meant as a way to enable support\
        \ for certain \n      special use-cases.\n\nOutput notes:\n  - output parameter of the request\
        \ are toggles the enable/disable each field's inclusion in the response\n  - all output parameters\
        \ are false by default\n  - altitude is in kilometers\n  - energy flux: erg/cm2/s\n  - mean energy:\
        \ eV"
      operationId: atm_inverse_api_v2_atm_inverse_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/src__atm__v2__schemas_inverse__ATMInverseRequest'
            examples:
              base:
                summary: Default request object
                description: Default field values, adjust accordingly
                value:
                  atm_model_version: '1.0'
                  timestamp: '2024-10-01T06:00:00'
                  geodetic_latitude: 0
                  geodetic_longitude: 0
                  intensity_4278: 1000
                  intensity_5577: 6000
                  intensity_6300: 600
                  intensity_8446: 400
                  precipitation_flux_spectral_type: gaussian
                  nrlmsis_model_version: '2.0'
                  special_logic_keyword: not_applicable
                  output:
                    altitudes: false
                    energy_flux: false
                    mean_energy: false
                    oxygen_correction_factor: false
                  no_cache: false
              example0:
                summary: A simple example
                description: A simple example
                value:
                  timestamp: '2024-01-01T06:00:00'
                  geodetic_latitude: 58.28
                  geodetic_longitude: -103.68
                  intensity_4278: 2300
                  intensity_5577: 11400
                  intensity_6300: 530
                  intensity_8446: 427
                  output:
                    altitudes: true
                    energy_flux: true
                    mean_energy: true
                    oxygen_correction_factor: true
              example1:
                summary: A simple example with all output parameters
                description: A simple example with all output parameters
                value:
                  timestamp: '2024-01-01T06:00:00'
                  geodetic_latitude: 58.28
                  geodetic_longitude: -103.68
                  intensity_4278: 2300
                  intensity_5577: 11400
                  intensity_6300: 530
                  intensity_8446: 427
                  output:
                    altitudes: true
                    energy_flux: true
                    mean_energy: true
                    oxygen_correction_factor: true
              example2:
                summary: A simple example without using the cache
                description: A simple example without using the cache
                value:
                  timestamp: '2024-01-01T06:00:00'
                  geodetic_latitude: 58.28
                  geodetic_longitude: -103.68
                  intensity_4278: 2300
                  intensity_5577: 11400
                  intensity_6300: 530
                  intensity_8446: 427
                  output:
                    altitudes: true
                    energy_flux: true
                    mean_energy: true
                    oxygen_correction_factor: true
                  no_cache: true
        required: true
      responses:
        '200':
          description: Calculated outputs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/src__atm__v2__schemas_inverse__ATMInverseResponse'
        '400':
          description: Problematic request made
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '500':
          description: Data generation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/utils/terminator:
    get:
      tags:
      - Utilities
      summary: Retrieve terminator coordinates
      description: "Retrieve coordinates for the terminator. \n\nThe timestamp parameter should be supplied\
        \ in the format \"YYYY-MM-DDTHH:mm:ss\". \nUTC is the expected timezone.\n\nThe angle parameter\
        \ is used for retrieving the terminator for civil, nautical, \nor astronomical twilight. Use the\
        \ values -6.0, -12.0, or -18.0 for each of these \nterminators, respectively.\n\nNotes:\n  - The\
        \ algorithm does not account for altitude at this time\n  - By default requests are cached. Use\
        \ the 'no_cache' parameter to disable this functionality."
      operationId: get_terminator_api_v1_utils_terminator_get
      parameters:
      - name: timestamp
        in: query
        required: true
        schema:
          type: string
          format: date-time
          title: Timestamp
      - name: angle
        in: query
        required: false
        schema:
          type: number
          default: -12.0
          title: Angle
      - name: no_cache
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: No Cache
      responses:
        '200':
          description: Terminator coordinates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Terminator'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/utils/magnetic_grid:
    get:
      tags:
      - Utilities
      summary: Retrieve geomagnetic coordinate grid
      description: "Retrieve a geomagnetic coordinate grid for a given timestamp.\n\nThe timestamp parameter\
        \ should be supplied in the format \"YYYY-MM-DDTHH:mm:ss\". \nUTC is the expected timezone.\n\n\
        The grid consists of meridian lines (constant magnetic longitude, \"vertical\") and parallel lines\n\
        (constant magnetic latitude, \"horizontal\") for both northern and southern hemispheres.\n\nNotes\n\
        \  - The resolution_lon and resolution_lat parameters control the spacing (in degrees) between\n\
        magnetic longitude and latitude lines, respectively. Lower values produce a denser grid.\n  -\
        \ By default requests are cached. Use the 'no_cache' parameter to disable this functionality."
      operationId: get_magnetic_grid_api_v1_utils_magnetic_grid_get
      parameters:
      - name: timestamp
        in: query
        required: true
        schema:
          type: string
          format: date-time
          title: Timestamp
      - name: resolution_lon
        in: query
        required: false
        schema:
          type: number
          default: 10.0
          title: Resolution Lon
      - name: resolution_lat
        in: query
        required: false
        schema:
          type: number
          default: 5.0
          title: Resolution Lat
      - name: min_latitude
        in: query
        required: false
        schema:
          type: number
          default: 50.0
          title: Min Latitude
      - name: altitude_km
        in: query
        required: false
        schema:
          type: number
          default: 0.0
          title: Altitude Km
      - name: no_cache
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: No Cache
      responses:
        '200':
          description: Geomagnetic grid in geographic coordinates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MagneticGrid'
        '400':
          description: Problematic request made
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
