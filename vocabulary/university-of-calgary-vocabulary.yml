vocabulary:
  name: University of Calgary Research API Vocabulary
  description: >-
    Controlled vocabulary of terms observed across the University of Calgary's
    public research APIs: the Space Remote Sensing (SRS) API and the AuroraX
    auroral-science API. Definitions are derived from the live OpenAPI
    descriptions and observed payloads.
  version: 1.0.0
  terms:
    - term: dataset
      definition: >-
        A named collection of space-physics / remote-sensing data products in
        the SRS data distribution service, with a processing level, citation,
        DOI, and a data tree URL.
      tags: [srs, data-distribution]
    - term: observatory
      definition: >-
        A ground-based site (identified by a short uid and geodetic
        latitude/longitude) hosting SRS instruments such as all-sky imagers or
        riometers.
      tags: [srs, ground]
    - term: data_tree_url
      definition: Base URL of the on-disk data tree for a dataset.
      tags: [srs, link]
    - term: file_time_resolution
      definition: >-
        Temporal granularity of files in a dataset; one of 1min, 1hr, 1day, or
        not_applicable.
      tags: [srs, enum]
    - term: supported_libraries
      definition: >-
        Client libraries that can read a dataset (pyaurorax, pyucrio,
        idl-aurorax, idl-ucrio, pyucalgarysrs).
      tags: [srs, client]
    - term: atm
      definition: >-
        Auroral Transport Model forward and inverse calculation endpoints
        (v1 and v2) provided by the SRS API.
      tags: [srs, model]
    - term: data source
      definition: >-
        An AuroraX record describing an instrument/platform combination,
        identified by a numeric identifier plus program, platform, and
        instrument_type.
      tags: [aurorax]
    - term: ephemeris
      definition: >-
        Time-series location/metadata records for a data source, searchable and
        used in conjunction searches in AuroraX.
      tags: [aurorax, search]
    - term: conjunction
      definition: >-
        A spatial-temporal coincidence between two or more data sources, found
        via the AuroraX conjunction search.
      tags: [aurorax, search]
    - term: data product
      definition: >-
        A derived AuroraX product (e.g. keogram, montage, movie) associated with
        a data source over a time range.
      tags: [aurorax]
    - term: source_type
      definition: >-
        Classification of an AuroraX data source (e.g. leo, heo, lunar, ground,
        event_list).
      tags: [aurorax, enum]
