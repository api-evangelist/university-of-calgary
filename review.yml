reviews:
  - date: '2026-06-03'
    rating: 3
    summary: >-
      The University of Calgary has no single central developer portal, but
      several real, public, documented APIs were verified live: the Space Remote
      Sensing API (api.phys.ucalgary.ca, Swagger docs) and the related AuroraX
      API (api.aurorax.space), the PRISM institutional repository on DSpace 8.3
      (REST API plus OAI-PMH, now served from ucalgary.scholaris.ca), and the
      PRISM research-data collection on the Borealis Dataverse platform (public
      Dataverse REST API). The library APIs guide catalogs third-party scholarly
      APIs rather than first-party endpoints. The ucalgary GitHub org exists
      (43 public repos). No endpoints were fabricated; rating reflects modest but
      genuine, research-driven public API maturity.
    endpoints:
