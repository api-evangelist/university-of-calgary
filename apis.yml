---
aid: university-of-calgary
name: University of Calgary
description: >-
  The University of Calgary is a public research university in Calgary, Alberta,
  Canada, ranked #198 in the QS World University Rankings 2025. Its public,
  documented developer footprint centers on research and scholarly
  infrastructure rather than a single central developer portal: the Space Remote
  Sensing (SRS) group operates a documented RESTful API at api.phys.ucalgary.ca
  and the related AuroraX auroral-science API at api.aurorax.space, with Python
  and IDL client libraries. The institutional repository PRISM runs on DSpace 8.3
  (REST API plus OAI-PMH) and the PRISM research-data repository is hosted on the
  Borealis Dataverse platform, which exposes a public Dataverse REST API. The
  university also maintains a GitHub organization and a library guide cataloging
  third-party scholarly APIs.
